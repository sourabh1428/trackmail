name: Send Daily Bulk Emails

on:
  # ── Triggered by your extraction repo when today's batch is ready ──────────
  repository_dispatch:
    types: [emails-extracted]

  # ── Fallback schedule: runs at 10:00 AM IST (04:30 UTC) every day ──────────
  # Remove or adjust if you only want dispatch-based triggering.
  schedule:
    - cron: "30 4 * * *"

  # ── Manual trigger from GitHub Actions UI ─────────────────────────────────
  workflow_dispatch:
    inputs:
      bunch_id:
        description: "Override bunchID (default: today DDMMYY)"
        required: false
      dry_run:
        description: "Dry run (true/false)"
        required: false
        default: "false"

jobs:
  send:
    name: Send emails for today's bunch
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout trackmail
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run send-daily-emails
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          EMAIL_USER:  ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:  ${{ secrets.EMAIL_PASS }}
          # Use bunchID from dispatch payload, or manual override, or default to today
          BUNCH_ID: ${{ github.event.client_payload.bunch_id || inputs.bunch_id || '' }}
          DRY_RUN:  ${{ inputs.dry_run || 'false' }}
        run: node send-daily-emails.js
