name: Daily Pipeline — Scrape + Chunked Send

on:
  schedule:
    - cron: "0 3 * * 1-5"   # scrape only      — 03:00 UTC = 08:30 IST, Mon–Fri
    - cron: "3 4 * * 1-5"   # send chunk 0     — 04:03 UTC ≈ 09:33 IST
    - cron: "7 8 * * 1-5"   # send chunk 1     — 08:07 UTC ≈ 13:37 IST
    - cron: "2 11 * * 1-5"  # send chunk 2     — 11:02 UTC ≈ 16:32 IST

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — preview without sending (true/false)"
        required: false
        default: "false"
      bunch_id:
        description: "Override bunchID (DDMMYY, blank = today)"
        required: false
      chunk_index:
        description: "Chunk to send (0, 1, or 2)"
        required: false
        default: "0"

jobs:
  # ── Scrape: runs once at 03:00 UTC so the bunch is ready before chunk 0 ──────
  scrape:
    name: Scrape LinkedIn emails
    if: github.event.schedule == '0 3 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LINKEDIN_EMAIL:     ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD:  ${{ secrets.LINKEDIN_PASSWORD }}
          MONGODB_URI:        ${{ secrets.MONGODB_URI }}
          MONGODB_DATABASE:   Linkedin_scrape
          MONGODB_COLLECTION: Emails
          HEADLESS_MODE:      true
          PYTHONUNBUFFERED:   1
        run: timeout 12m python main.py || true

  # ── Send: runs at each of the three send-window crons (or manual dispatch) ───
  send:
    name: Send email chunk
    if: >
      github.event.schedule == '3 4 * * 1-5'  ||
      github.event.schedule == '7 8 * * 1-5'  ||
      github.event.schedule == '2 11 * * 1-5' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Resolve chunk index from trigger
        id: chunk
        run: |
          case "${{ github.event.schedule }}" in
            "3 4 * * 1-5")  echo "index=0" >> $GITHUB_OUTPUT ;;
            "7 8 * * 1-5")  echo "index=1" >> $GITHUB_OUTPUT ;;
            "2 11 * * 1-5") echo "index=2" >> $GITHUB_OUTPUT ;;
            *)               echo "index=${{ inputs.chunk_index || '0' }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Send email chunk
        env:
          MONGODB_URI:       ${{ secrets.MONGODB_URI }}
          EMAIL_USER:        ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:        ${{ secrets.EMAIL_PASS }}
          BUNCH_ID:          ${{ inputs.bunch_id || '' }}
          DRY_RUN:           ${{ inputs.dry_run || 'false' }}
          CHUNK_INDEX:       ${{ steps.chunk.outputs.index }}
          CHUNK_SIZE:        "12"
          MAX_DAILY_SENDS:   "35"
          SEND_DELAY_MIN_MS: "45000"
          SEND_DELAY_MAX_MS: "90000"
        run: node send-daily-emails.js
